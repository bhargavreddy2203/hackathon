name: Deploy to Kubernetes - PROD

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - all
          - patient-service
          - application-service
          - order-service
      image_tag:
        description: 'Image tag (REQUIRED for production)'
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: prod

jobs:
  deploy:
    name: Deploy to PRODUCTION
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (Bootstrap)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BOOTSTRAP_ROLE_ARN }}
          role-session-name: GitHubActions-K8s-Prod-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Make Scripts Executable
        run: chmod +x scripts/*.sh

      - name: AWS Authentication and Setup
        id: aws_setup
        run: |
          ./scripts/aws-ecr-login.sh ${{ env.ENVIRONMENT }} ${{ env.AWS_REGION }}

      - name: Setup kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client

      - name: Configure kubectl for EKS
        run: |
          CLUSTER_NAME="microservices-${{ env.ENVIRONMENT }}-eks-cluster"
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER_NAME
          kubectl get nodes

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Set Image Tag
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          ENV="${{ env.ENVIRONMENT }}"
          TAG="${{ github.event.inputs.image_tag }}"
          
          echo "⚠️ PRODUCTION DEPLOYMENT"
          echo "Service: $SERVICE"
          echo "Image Tag: $TAG"
          
          if [ "$SERVICE" == "all" ]; then
            yq eval ".${ENV}.patient-service.tag = \"${TAG}\"" -i deployments/images.yaml
            yq eval ".${ENV}.application-service.tag = \"${TAG}\"" -i deployments/images.yaml
            yq eval ".${ENV}.order-service.tag = \"${TAG}\"" -i deployments/images.yaml
          else
            yq eval ".${ENV}.${SERVICE}.tag = \"${TAG}\"" -i deployments/images.yaml
          fi

      - name: Deploy Services
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SERVICE="${{ github.event.inputs.service }}"
          ENV="${{ env.ENVIRONMENT }}"
          
          echo "⚠️ DEPLOYING TO PRODUCTION ⚠️"
          echo "Environment: $ENV"
          echo "Service: $SERVICE"
          echo ""
          
          if [ "$SERVICE" == "all" ]; then
            echo "Deploying all services to PRODUCTION..."
            
            # Patient Service
            PATIENT_REPO=$(yq eval ".${ENV}.patient-service.repository" deployments/images.yaml | sed "s/<ACCOUNT_ID>/$ACCOUNT_ID/g")
            PATIENT_TAG=$(yq eval ".${ENV}.patient-service.tag" deployments/images.yaml)
            echo "Patient Service: $PATIENT_REPO:$PATIENT_TAG"
            sed -e "s|image: patient-service:latest|image: $PATIENT_REPO:$PATIENT_TAG|g" \
                -e "s|environment: dev|environment: $ENV|g" \
                "deployments/base/patient-service.yaml" | kubectl apply -f -
            
            # Application Service
            APPLICATION_REPO=$(yq eval ".${ENV}.application-service.repository" deployments/images.yaml | sed "s/<ACCOUNT_ID>/$ACCOUNT_ID/g")
            APPLICATION_TAG=$(yq eval ".${ENV}.application-service.tag" deployments/images.yaml)
            echo "Application Service: $APPLICATION_REPO:$APPLICATION_TAG"
            sed -e "s|image: application-service:latest|image: $APPLICATION_REPO:$APPLICATION_TAG|g" \
                -e "s|environment: dev|environment: $ENV|g" \
                "deployments/base/application-service.yaml" | kubectl apply -f -
            
            # Order Service
            ORDER_REPO=$(yq eval ".${ENV}.order-service.repository" deployments/images.yaml | sed "s/<ACCOUNT_ID>/$ACCOUNT_ID/g")
            ORDER_TAG=$(yq eval ".${ENV}.order-service.tag" deployments/images.yaml)
            echo "Order Service: $ORDER_REPO:$ORDER_TAG"
            sed -e "s|image: order-service:latest|image: $ORDER_REPO:$ORDER_TAG|g" \
                -e "s|environment: dev|environment: $ENV|g" \
                "deployments/base/order-service.yaml" | kubectl apply -f -
            
            # Ingress
            echo "Deploying ingress..."
            sed -e "s|Environment=dev|Environment=$ENV|g" \
                "deployments/base/ingress.yaml" | kubectl apply -f -
          else
            REPO=$(yq eval ".${ENV}.${SERVICE}.repository" deployments/images.yaml | sed "s/<ACCOUNT_ID>/$ACCOUNT_ID/g")
            TAG=$(yq eval ".${ENV}.${SERVICE}.tag" deployments/images.yaml)
            
            echo "Deploying $SERVICE to PRODUCTION with image: $REPO:$TAG"
            
            sed -e "s|image: ${SERVICE}:latest|image: $REPO:$TAG|g" \
                -e "s|environment: dev|environment: $ENV|g" \
                "deployments/base/${SERVICE}.yaml" | kubectl apply -f -
          fi

      - name: Wait for Deployment
        run: |
          if [ "${{ github.event.inputs.service }}" == "all" ]; then
            echo "Waiting for all deployments to complete..."
            kubectl rollout status deployment/patient-service --timeout=5m
            kubectl rollout status deployment/application-service --timeout=5m
            kubectl rollout status deployment/order-service --timeout=5m
          else
            echo "Waiting for ${{ github.event.inputs.service }} deployment to complete..."
            kubectl rollout status deployment/${{ github.event.inputs.service }} --timeout=5m
          fi

      - name: Get Deployment Status
        if: always()
        run: |
          echo "## ⚠️ Deployment Status - PRODUCTION ⚠️" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** PRODUCTION" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ github.event.inputs.service }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** ${{ github.event.inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event.inputs.service }}" == "all" ]; then
            echo "### All Services" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            kubectl get deployments >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ${{ github.event.inputs.service }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            kubectl get deployment ${{ github.event.inputs.service }} >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pods" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get pods >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Ingress" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get ingress >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Get Service URL
        run: |
          LB_URL=$(kubectl get ingress microservices-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "Pending...")
          echo "## Service URLs - PRODUCTION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Load Balancer:** \`$LB_URL\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Endpoints:**" >> $GITHUB_STEP_SUMMARY
          echo "- Patient Service: http://$LB_URL/patients" >> $GITHUB_STEP_SUMMARY
          echo "- Application Service: http://$LB_URL/appointments" >> $GITHUB_STEP_SUMMARY
          echo "- Order Service: http://$LB_URL/orders" >> $GITHUB_STEP_SUMMARY
